id: workflow:run-vision-review
kind: workflow
title: Run Vision Review
summary: Captures public-safe page or screenshot targets and runs local-first vision-model review with sanitized provenance and structured review artifacts.
visibility: public
relations:
  - type: part-of
    target: domain:ai-quality-loops
  - type: uses
    target: component:vision-review
  - type: documented-in
    target: document:aiql-readme
  - type: documented-in
    target: document:portfolio-role-and-roadmap
  - type: tested-by
    target: test-scope:aiql-verification
agent:
  load_when:
    - Changing screenshot, section discovery, preview, or vision review behavior.
  token_budget_hint: 1600
